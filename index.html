<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FastFetch Stock Table</title>
    <link href="/src/index.css" rel="stylesheet" />
  </head>
  <body class="bg-slate-950 text-slate-100 antialiased">
    <main class="min-h-screen px-4 py-6">
      <div class="mx-auto max-w-screen-2xl space-y-4">
        <header class="space-y-3">
          <div class="flex flex-col gap-2 sm:flex-row sm:items-baseline sm:justify-between">
            <div>
              <h1 class="text-2xl font-semibold tracking-tight text-slate-50">
                Finapp
              </h1>
              <p class="mt-1 text-sm text-slate-400">
                Tempat anda tracking stock anda
              </p>
              <p class="mt-0.5 text-[11px] text-slate-500">
                by Azeroth (github : asda1-max)
              </p>
            </div>
            <div class="text-xs text-slate-400">
              Live from
              <span class="rounded-full bg-slate-800 px-2 py-0.5 text-[11px] font-medium text-sky-300">
                /stocks
              </span>
            </div>
          </div>

          <div class="flex flex-col gap-2 rounded-2xl border border-slate-800 bg-slate-900/70 p-3 sm:flex-row sm:items-center sm:gap-3">
            <label for="ticker-input" class="text-xs text-slate-300 sm:w-40">Cari ticker spesifik</label>
            <div class="flex flex-1 items-center gap-2">
              <input
                id="ticker-input"
                type="text"
                placeholder="Misal: BBCA.JK"
                class="flex-1 rounded-lg border border-slate-800 bg-slate-950/60 px-2 py-1.5 text-xs text-slate-100 placeholder:text-slate-600 focus:border-sky-500 focus:outline-none focus:ring-1 focus:ring-sky-500"
              />
              <button
                id="ticker-submit"
                class="rounded-lg bg-sky-600 px-3 py-1.5 text-xs font-medium text-slate-50 hover:bg-sky-500 disabled:cursor-not-allowed disabled:bg-slate-700"
              >
                Fetch
              </button>
              <a
                href="/ranking.html"
                class="rounded-lg border border-slate-700 bg-slate-900 px-3 py-1.5 text-xs font-medium text-slate-100 hover:border-sky-500 hover:text-sky-200"
              >
                Ranking
              </a>
            </div>
          </div>
        </header>

        <section class="rounded-2xl border border-slate-800 bg-slate-900/70 p-3 sm:p-4">
          <div id="status" class="mb-3 text-xs text-slate-400">
            Belum ada saham. Tambahkan dengan mengetik ticker di atas.
          </div>
          <div id="stocks-cards" class="grid gap-3 sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"></div>

          <div class="mt-4 space-y-1">
            <h3 class="text-[11px] font-semibold text-slate-300">JSON ticker yang sudah dicari</h3>
            <pre
              id="ticker-json"
              class="max-h-40 overflow-x-auto overflow-y-auto rounded-lg border border-slate-800 bg-slate-950/70 p-2 text-[10px] text-slate-300"
            >[]</pre>
          </div>
        </section>
      </div>
    </main>

    <script type="module" src="/src/renderer.js"></script>
  </body>
</html>

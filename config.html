<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hybrid Config</title>
    <link href="/src/index.css" rel="stylesheet" />
  </head>
  <body class="bg-slate-950 text-slate-100 antialiased">
    <main class="min-h-screen px-4 py-6">
      <div class="mx-auto max-w-5xl space-y-4">
        <header class="space-y-2">
          <button
            id="back-button"
            class="text-xs text-sky-300 hover:text-sky-200 flex items-center gap-1"
            type="button"
          >
            <span>&larr;</span>
            <span>Kembali ke dashboard</span>
          </button>
          <div>
            <h1 class="text-2xl font-semibold tracking-tight text-slate-50">Hybrid Weight Configuration</h1>
            <p class="text-sm text-slate-400">
              Ubah bobot kriteria hybrid untuk mode with CAGR dan dashboard (tanpa CAGR).
            </p>
          </div>
        </header>

        <section class="rounded-2xl border border-slate-800 bg-slate-900/70 p-4 space-y-4">
          <div class="grid gap-4 md:grid-cols-2">
            <div class="rounded-xl border border-slate-800 bg-slate-950/60 p-3 space-y-2">
              <h2 class="text-sm font-semibold text-slate-100">Mode: use_cagr</h2>
              <div id="use-cagr-weights" class="space-y-1.5"></div>
              <div class="text-xs text-slate-400">
                Total bobot: <span id="use-cagr-sum" class="font-semibold text-cyan-300">-</span>
              </div>
              <div class="grid grid-cols-3 gap-2">
                <label class="text-[11px] text-slate-300">Recommended
                  <input id="use-cagr-recommended" type="number" step="any" class="mt-1 w-full rounded-md border border-slate-700 bg-slate-950 px-2 py-1 text-xs" />
                </label>
                <label class="text-[11px] text-slate-300">Buy
                  <input id="use-cagr-buy" type="number" step="any" class="mt-1 w-full rounded-md border border-slate-700 bg-slate-950 px-2 py-1 text-xs" />
                </label>
                <label class="text-[11px] text-slate-300">Risk
                  <input id="use-cagr-risk" type="number" step="any" class="mt-1 w-full rounded-md border border-slate-700 bg-slate-950 px-2 py-1 text-xs" />
                </label>
              </div>
            </div>

            <div class="rounded-xl border border-slate-800 bg-slate-950/60 p-3 space-y-2">
              <h2 class="text-sm font-semibold text-slate-100">Mode: no_cagr</h2>
              <div id="no-cagr-weights" class="space-y-1.5"></div>
              <div class="text-xs text-slate-400">
                Total bobot: <span id="no-cagr-sum" class="font-semibold text-cyan-300">-</span>
              </div>
              <div class="grid grid-cols-3 gap-2">
                <label class="text-[11px] text-slate-300">Recommended
                  <input id="no-cagr-recommended" type="number" step="any" class="mt-1 w-full rounded-md border border-slate-700 bg-slate-950 px-2 py-1 text-xs" />
                </label>
                <label class="text-[11px] text-slate-300">Buy
                  <input id="no-cagr-buy" type="number" step="any" class="mt-1 w-full rounded-md border border-slate-700 bg-slate-950 px-2 py-1 text-xs" />
                </label>
                <label class="text-[11px] text-slate-300">Risk
                  <input id="no-cagr-risk" type="number" step="any" class="mt-1 w-full rounded-md border border-slate-700 bg-slate-950 px-2 py-1 text-xs" />
                </label>
              </div>
            </div>
          </div>

          <div class="flex flex-wrap items-center gap-2">
            <button id="reset-default-btn" type="button" class="rounded-lg border border-slate-700 bg-slate-900 px-3 py-1.5 text-xs font-medium text-slate-200 hover:border-sky-500 hover:text-sky-200">
              Reset ke Default
            </button>
            <button id="save-btn" type="button" class="rounded-lg bg-sky-600 px-3 py-1.5 text-xs font-semibold text-slate-50 hover:bg-sky-500">
              Simpan Config
            </button>
            <span id="status" class="text-xs text-slate-400">Memuat config...</span>
          </div>
        </section>
      </div>
    </main>

    <script type="module" src="/src/config.js"></script>
  </body>
</html>
